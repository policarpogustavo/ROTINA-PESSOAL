<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minha Semana</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.85em%22 font-size=%2288%22>🗓️</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="week-page">

    <div class="week-header">
      <div class="week-kicker">Planejamento Semanal</div>
      <div class="week-title">Minha Semana</div>
      <div class="week-subtitle">Estudo, treino, trabalho, leitura e tempo pra curtir — todo dia útil.</div>
      <div class="week-actions">
        <div class="week-hint">✏️ Clique num horário, atividade ou observação pra editar — fica salvo neste navegador.</div>
      </div>
    </div>

    <div class="week-legend" id="legend"></div>

    <div class="week-scroll-hint">↔ Deslize para o lado para ver a semana toda</div>

    <div class="week-grid-card">
      <div class="week-grid" id="grid"></div>
    </div>

    <div class="week-footer">Fins de semana livres para descansar e aproveitar.</div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
